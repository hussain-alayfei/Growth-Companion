kind = "web"
previewPath = "/"
title = "Life OS"
version = "1.0.0"
id = "artifacts/life-os"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19185

[services.development]
run = "pnpm --filter @workspace/life-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life-os", "run", "build" ]
serve = "static"
publicDir = "artifacts/life-os/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19185"
BASE_PATH = "/"
