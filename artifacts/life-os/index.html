<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TradeUp</title>
    <meta name="description" content="TradeUp — رفيقك في التداول والنمو الشخصي" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="TradeUp" />
    <meta property="og:description" content="TradeUp — رفيقك في التداول والنمو الشخصي" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TradeUp" />
    <meta name="twitter:description" content="TradeUp — رفيقك في التداول والنمو الشخصي" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Almarai', sans-serif; }
    </style>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('tradeup-theme');
          if (theme !== 'light' && theme !== 'dark') theme = 'dark';
          var root = document.documentElement;
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
