services:
  - type: web
    name: tradeup-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db exec drizzle-kit push --force --config ./drizzle.config.ts
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        fromDatabase:
          name: tradeup-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: tradeup-db
    plan: free
    region: oregon
